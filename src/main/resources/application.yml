spring:
  application:
    name: kyc-screening-service

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/kyc}
      auto-index-creation: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://issuer.example.com}

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level [%X{cid:-}] %logger{36} - %msg%n"
  level:
    org.springframework.data.mongodb: WARN
    com.hafiz5007.kyc: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
